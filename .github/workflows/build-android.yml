name: Build Android AAB

# Secrets necessários no repositório GitHub:
#   EXPO_TOKEN                        — token de acesso EAS (expo.dev → Account Settings → Access Tokens)
#   EXPO_PUBLIC_SUPABASE_URL          — URL do projeto Supabase (ex: https://xxx.supabase.co)
#   EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY — chave publishable do Supabase

on:
  push:
    branches:
      - master
      - 'release/**'
  workflow_dispatch:

jobs:
  build:
    name: Build AAB (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android AAB via EAS
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Resumo do build
        run: |
          echo "✅ Build enviado para EAS. Acompanhe em:"
          echo "https://expo.dev/accounts/ridabe_2026/projects/sirvaos-app/builds"
