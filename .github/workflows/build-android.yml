name: Build Android AAB

# Secrets necessários (Settings → Secrets and variables → Actions → New repository secret):
#
#   EXPO_TOKEN                            Token EAS → expo.dev → Account Settings → Access Tokens
#   EXPO_PUBLIC_SUPABASE_URL              URL do projeto Supabase
#   EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY  Chave publishable do Supabase
#   EXPO_PUBLIC_YOUTUBE_API_KEY           Chave da YouTube Data API v3 (Google Cloud Console)
#
# O keystore de signing é gerenciado pelo EAS (já configurado na conta Expo).
# O build roda localmente no runner do GitHub — sem consumir minutos EAS.

on:
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - app.json
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo do build manual'
        required: false
        default: 'Build manual'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build AAB (local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build AAB localmente
        run: eas build --platform android --profile production --local --non-interactive --output ./build/app-release.aab
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_YOUTUBE_API_KEY: ${{ secrets.EXPO_PUBLIC_YOUTUBE_API_KEY }}

      - name: Upload AAB como artefato
        uses: actions/upload-artifact@v4
        with:
          name: sirvaos-v${{ github.run_number }}
          path: ./build/app-release.aab
          retention-days: 30
